
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'STKaiti', 'KaiTi', 'Microsoft YaHei', serif;
            font-size: 14pt;
            background-color: white;
        }
        .cover-page {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid #003366; /* Mock border for preview */
        }
        .header-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 36pt;
            background-color: #003366;
        }
        .header-content {
            margin-top: 50pt;
            padding: 0 60pt;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        .header-text {
            font-size: 16pt;
            font-style: italic;
            color: #333;
        }
        .title-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 60pt;
            text-align: right;
        }
        .cn-main {
            font-size: 30pt;
            font-weight: bold;
            color: #003366;
            margin: 0;
        }
        .cn-sub {
            font-size: 28pt;
            font-weight: bold;
            color: #003366;
            margin: 8pt 0;
        }
        .eng-main, .eng-sub {
            font-family: sans-serif;
            font-size: 18pt;
            color: #333;
            margin: 4pt 0;
        }
        .producer-info {
            padding: 0 60pt 80pt 60pt;
        }
        .producer-info p {
            font-size: 14pt;
            margin: 2pt 0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="cover-page">
        <div class="header-bar"></div>
        <div class="header-content">
            <span class="header-text">数据管理前沿资料译介</span>
        </div>
        <div class="title-section">
            <h1 class="cn-main">构建 Claude Code 的经验教训</h1>
            <h2 class="cn-sub">我们如何使用技能</h2>
            <p class="eng-main">Lessons building Claude Code</p>
            <p class="eng-sub"> how we use skills</p>
        </div>
        <div class="producer-info">
            <p>出品方：Anthropic (X)</p>
            <p>出品时间：2026年4月5日</p>
        </div>
    </div>
</body>
</html>
